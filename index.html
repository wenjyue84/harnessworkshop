<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harness Engineering — Prisma AI Workforce</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #25253a;
    --text: #e6e6f0;
    --text-dim: #7878a0;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --accent3: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --pink: #ec4899;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }

  /* ── Progress bar ── */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--pink));
    transition: width 0.4s ease;
    z-index: 200;
    box-shadow: 0 0 8px rgba(99,102,241,.6);
  }

  /* ── Iframe viewport ── */
  #frame-wrap {
    position: fixed;
    inset: 0;
    bottom: 52px;
    overflow: hidden;
  }

  #slide-frame {
    width: 100%; height: 100%;
    border: none;
    display: block;
    opacity: 1;
    transition: opacity 0.18s ease;
  }

  #slide-frame.fading { opacity: 0; }

  /* ── Nav bar ── */
  #nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(8, 8, 15, 0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 150;
    gap: 12px;
  }

  /* ── Nav buttons ── */
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--surface2);
    border-color: var(--accent);
  }

  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ── Slide counter ── */
  #counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 52px;
    text-align: center;
    flex-shrink: 0;
  }

  /* ── Dots ── */
  #dots {
    display: flex;
    gap: 5px;
    flex: 1;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    padding: 0 8px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background 0.2s, transform 0.2s, width 0.2s;
    flex-shrink: 0;
  }

  .dot.active {
    background: var(--accent);
    width: 22px;
    border-radius: 4px;
  }

  .dot:hover { background: var(--accent2); transform: scale(1.3); }

  /* ── Utility buttons ── */
  .nav-util {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  /* ── Overview overlay ── */
  #overview {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,8,15,.96);
    z-index: 300;
    overflow-y: auto;
    padding: 36px 32px;
  }

  #overview.open { display: block; }

  #overview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  #overview-header h2 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  #overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .ov-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }

  .ov-card:hover,
  .ov-card.current { border-color: var(--accent); transform: translateY(-2px); }

  .ov-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .ov-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
  }

  /* ── Keyboard hint ── */
  #kbd-hint {
    position: fixed;
    top: 14px; right: 14px;
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.35;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.3s;
  }

  #kbd-hint.hide { opacity: 0; }

  kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── Google Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
</style>
</head>
<body>

<div id="progress-bar"></div>

<div id="kbd-hint">
  <kbd>←</kbd><kbd>→</kbd> navigate &nbsp; <kbd>?</kbd> overview
</div>

<div id="frame-wrap">
  <iframe id="slide-frame" src="slides/s01.html" title="Slide"></iframe>
</div>

<nav id="nav">
  <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
    <button class="nav-btn" id="btn-prev" onclick="go(cur-1)" title="Previous (←)">&#8592;</button>
    <span id="counter">1 / 14</span>
    <button class="nav-btn" id="btn-next" onclick="go(cur+1)" title="Next (→)">&#8594;</button>
  </div>

  <div id="dots"></div>

  <div class="nav-util">
    <button class="nav-btn" onclick="toggleOverview()" title="Overview (?)" style="font-size:13px;">&#9638;</button>
    <button class="nav-btn" onclick="go(0)" title="First slide" style="font-size:11px;">&#8676;</button>
    <button class="nav-btn" onclick="go(TOTAL-1)" title="Last slide" style="font-size:11px;">&#8677;</button>
  </div>
</nav>

<!-- Overview -->
<div id="overview">
  <div id="overview-header">
    <h2>&#9638; Slide Overview</h2>
    <button class="nav-btn" onclick="toggleOverview()" style="width:36px;height:36px;font-size:18px;">&#10005;</button>
  </div>
  <div id="overview-grid"></div>
</div>

<script>
const SLIDES = [
  { file: 's01.html', title: 'Harness Engineering — Title' },
  { file: 's02.html', title: 'The Evolution of AI Engineering' },
  { file: 's03.html', title: 'The Engine vs. The Car' },
  { file: 's04.html', title: 'The Probability Machine' },
  { file: 's05.html', title: 'Workshop: Shifting Probabilities' },
  { file: 's06.html', title: 'Context7 — Live Docs for Your LLM' },
  { file: 's07.html', title: 'Tooling: CLI vs MCP vs API' },
  { file: 's08.html', title: 'Browser Skills Breakdown' },
  { file: 's09.html', title: 'Claude Code Hooks' },
  { file: 's10.html', title: 'Philosophy: Test-Driven AI' },
  { file: 's11.html', title: 'Agents = Context Management' },
  { file: 's12.html', title: 'The Autonomous Agent Team' },
  { file: 's13.html', title: 'Ralph & Long-Running Agents' },
  { file: 's14.html', title: 'PRD Skill + Q&A' },
];

const TOTAL = SLIDES.length;
let cur = 0;
const frame = document.getElementById('slide-frame');
const progressBar = document.getElementById('progress-bar');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const dotsEl = document.getElementById('dots');

// Build dots
SLIDES.forEach((_, i) => {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.title = SLIDES[i].title;
  d.onclick = () => go(i);
  dotsEl.appendChild(d);
});

// Build overview grid
const ovGrid = document.getElementById('overview-grid');
SLIDES.forEach((s, i) => {
  const c = document.createElement('div');
  c.className = 'ov-card' + (i === 0 ? ' current' : '');
  c.innerHTML = `<div class="ov-num">${String(i+1).padStart(2,'0')} / ${TOTAL}</div>
                 <div class="ov-title">${s.title}</div>`;
  c.onclick = () => { go(i); toggleOverview(); };
  ovGrid.appendChild(c);
});

function go(n) {
  if (n < 0 || n >= TOTAL || n === cur) return;
  frame.classList.add('fading');
  setTimeout(() => {
    cur = n;
    frame.src = 'slides/' + SLIDES[n].file;
    frame.classList.remove('fading');
    updateUI();
  }, 180);
}

function updateUI() {
  counter.textContent = `${cur+1} / ${TOTAL}`;
  progressBar.style.width = `${((cur+1)/TOTAL)*100}%`;
  btnPrev.disabled = cur === 0;
  btnNext.disabled = cur === TOTAL - 1;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === cur));
  document.querySelectorAll('.ov-card').forEach((c,i) => c.classList.toggle('current', i === cur));
}

function toggleOverview() {
  document.getElementById('overview').classList.toggle('open');
}

// Keyboard
document.addEventListener('keydown', e => {
  const ov = document.getElementById('overview');
  if (ov.classList.contains('open')) {
    if (e.key === 'Escape' || e.key === '?') toggleOverview();
    return;
  }
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(cur+1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); go(cur-1); }
  if (e.key === 'Home')       go(0);
  if (e.key === 'End')        go(TOTAL-1);
  if (e.key === '?')          toggleOverview();
  if (e.key === 'Escape')     toggleOverview();
});

// Touch swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; });
document.addEventListener('touchend', e => {
  const dx = tx - e.changedTouches[0].screenX;
  if (Math.abs(dx) > 60) dx > 0 ? go(cur+1) : go(cur-1);
});

// Hide keyboard hint after 5s
setTimeout(() => {
  document.getElementById('kbd-hint').classList.add('hide');
}, 5000);

// Init progress bar
progressBar.style.width = `${(1/TOTAL)*100}%`;
</script>
</body>
</html>
